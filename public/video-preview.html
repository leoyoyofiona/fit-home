<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>视频预览</title>
<style>
  body{background:#1a1a2e;color:#fff;font-family:sans-serif;padding:20px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .card{background:#16213e;border-radius:8px;overflow:hidden}
  .card video{width:100%;height:180px;object-fit:cover;background:#000}
  .card .label{padding:8px;font-size:14px;text-align:center}
</style></head><body>
<div class="grid">
  <div class="card"><video src="/videos/v01.mp4" muted></video><div class="label">v01</div></div>
  <div class="card"><video src="/videos/v02.mp4" muted></video><div class="label">v02</div></div>
  <div class="card"><video src="/videos/v03.mp4" muted></video><div class="label">v03</div></div>
  <div class="card"><video src="/videos/v04.mp4" muted></video><div class="label">v04</div></div>
  <div class="card"><video src="/videos/v05.mp4" muted></video><div class="label">v05</div></div>
  <div class="card"><video src="/videos/v06.mp4" muted></video><div class="label">v06</div></div>
  <div class="card"><video src="/videos/v07.mp4" muted></video><div class="label">v07</div></div>
  <div class="card"><video src="/videos/v08.mp4" muted></video><div class="label">v08</div></div>
  <div class="card"><video src="/videos/v10.mp4" muted></video><div class="label">v10</div></div>
</div>
<script>
  document.querySelectorAll('video').forEach(v => { v.currentTime = 0.5; v.load(); });
</script>
</body></html>
